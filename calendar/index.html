<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-left">
      <button id="btn-today">Today</button>
      <div class="header-nav">
        <button id="btn-prev" aria-label="Previous month">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <button id="btn-next" aria-label="Next month">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
        </button>
      </div>
      <h1 id="month-year-label"></h1>
    </div>
    <div class="header-right">
      <button class="icon-btn" aria-label="Search">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <button class="icon-btn" aria-label="Help">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
      </button>
      <button class="icon-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
      <button class="view-selector" aria-label="View selector">
        Month
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 10l5 5 5-5z"/></svg>
      </button>
      <div class="header-avatar" aria-label="Account">D</div>
    </div>
  </header>

  <main class="calendar-container">
    <div class="day-headers" aria-hidden="true">
      <span>Sun</span>
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
    </div>
    <div id="calendar-grid" role="grid" aria-label="Calendar"></div>
  </main>

  <button id="btn-add-event" aria-label="Add event">
    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
    <span>New event</span>
  </button>

  <dialog id="event-modal" aria-labelledby="modal-title">
    <h2 id="modal-title">Add Event</h2>
    <form id="event-form" novalidate>

      <input type="hidden" id="field-id" />

      <div class="form-group">
        <label for="field-title">Title <span class="required">*</span></label>
        <input type="text" id="field-title" maxlength="100" autocomplete="off" />
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="field-date">Date <span class="required">*</span></label>
          <input type="date" id="field-date" />
        </div>
        <div class="form-group">
          <label for="field-time">Time <span class="optional">(optional)</span></label>
          <input type="time" id="field-time" />
        </div>
      </div>

      <div class="form-group">
        <label for="field-color">Color</label>
        <select id="field-color">
          <option value="blue">Blue</option>
          <option value="green">Green</option>
          <option value="red">Red</option>
          <option value="orange">Orange</option>
          <option value="purple">Purple</option>
        </select>
      </div>

      <div class="form-group">
        <label for="field-notes">Notes <span class="optional">(optional)</span></label>
        <textarea id="field-notes" rows="3" maxlength="500"></textarea>
      </div>

      <div class="form-errors" aria-live="polite" role="alert"></div>

      <div class="modal-actions">
        <button type="button" id="btn-delete" class="btn-danger">Delete</button>
        <div class="modal-actions-right">
          <button type="button" id="btn-cancel">Cancel</button>
          <button type="submit" id="btn-save" class="btn-primary">Save</button>
        </div>
      </div>

    </form>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
